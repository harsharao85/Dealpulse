---
applications:
  - name: dealpulse
    memory: 256M
    disk_quota: 512M
    instances: 1
    buildpacks:
      - nodejs_buildpack
    command: node srv/dealpulse-service.js
    routes:
      - route: dealpulse-hr.cfapps.us10-001.hana.ondemand.com
    env:
      NODE_ENV: production
      # ANTHROPIC_API_KEY is injected via BTP user-provided service or environment variable.
      # Production recommendation: bind SAP AI Core service instead.
      # cf cups dealpulse-ai-key -p '{"ANTHROPIC_API_KEY":"your-key"}'
      # cf bind-service dealpulse dealpulse-ai-key
    health-check-type: http
    health-check-http-endpoint: /api/health
    timeout: 60
